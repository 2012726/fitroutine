<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitRoutine - 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-glass-card">
      <div class="brand-header">
        <div class="brand-logo">🔥</div>
        <h1>FitRoutine</h1>
        <p>오늘의 운동과 식단을 체계적으로 관리하세요</p>
      </div>

      <form id="login-form" class="auth-form">
        <div class="alert-message hidden" id="alert-box"></div>

        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요 (6자 이상)" required autocomplete="current-password">
        </div>

        <button type="submit" id="btn-login" class="btn btn-primary btn-block">로그인</button>
      </form>

      <div class="auth-footer">
        계정이 없으신가요? <a href="register.html">회원가입</a>
      </div>
    </div>
  </div>

  <script>
    // Simple verification check to see if user is already logged in
    fetch('/auth/me')
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          window.location.href = '/index.html';
        }
      })
      .catch(() => {});

    // Handle Form Submission via AJAX
    const form = document.getElementById('login-form');
    const alertBox = document.getElementById('alert-box');
    const submitBtn = document.getElementById('btn-login');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Reset Alert
      alertBox.className = 'alert-message hidden';
      submitBtn.disabled = true;
      submitBtn.innerText = '로그인 중...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          alertBox.className = 'alert-message alert-success';
          alertBox.textContent = '로그인에 성공했습니다! 대시보드로 이동합니다.';
          
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 1000);
        } else {
          alertBox.className = 'alert-message alert-danger';
          alertBox.textContent = data.message || '로그인에 실패했습니다. 정보를 확인해 주세요.';
          submitBtn.disabled = false;
          submitBtn.innerText = '로그인';
        }
      } catch (error) {
        console.error('Login Error:', error);
        alertBox.className = 'alert-message alert-danger';
        alertBox.textContent = '서버 연결에 실패했습니다. 나중에 다시 시도해 주세요.';
        submitBtn.disabled = false;
        submitBtn.innerText = '로그인';
      }
    });
  </script>
</body>
</html>
